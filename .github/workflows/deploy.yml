name: Deploy
run-name: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.display_title || format('Manual deploy by {0}', github.actor) }}

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    env:
      WRANGLER_SEND_METRICS: "false"
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:web

      - name: Patch wrangler.toml
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
          TABLE_PREFIX: ${{ vars.TABLE_PREFIX }}
        run: |
          sed -i "s/CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER/${CLOUDFLARE_ACCOUNT_ID}/" wrangler.toml
          sed -i "s/D1_DATABASE_NAME_PLACEHOLDER/${D1_DATABASE_NAME}/g" wrangler.toml
          sed -i "s/D1_DATABASE_ID_PLACEHOLDER/${D1_DATABASE_ID}/g" wrangler.toml
          sed -i "s/KV_NAMESPACE_ID_PLACEHOLDER/${KV_NAMESPACE_ID}/g" wrangler.toml
          sed -i "s/JWT_SECRET_PLACEHOLDER/${JWT_SECRET}/" wrangler.toml
          sed -i "s/SETUP_SECRET_PLACEHOLDER/${SETUP_SECRET}/" wrangler.toml
          sed -i "s/TABLE_PREFIX_PLACEHOLDER/${TABLE_PREFIX}/" wrangler.toml

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy
